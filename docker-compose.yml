services:
  xray:
    build:
      context: ./docker/xray
    container_name: "xray"
    restart: unless-stopped
    environment:
      - UUID=${UUID}
      - WS_PATH=${WS_PATH}
    volumes:
      - ./docker/xray/config.json.tpl:/etc/xray/config.json.tpl
    networks:
      - xraynet

  nginx:
    build:
      context: ./docker/nginx
    container_name: "nginx"
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - WS_PATH=${WS_PATH}
    volumes:
      - ./docker/nginx/default.conf.tpl:/etc/nginx/conf.d/default.conf.tpl
      - ./docker/nginx/index.html.tpl:/var/www/html/index.html.tpl
      - ./docker/nginx/cars.jpg:/var/www/html/cars.jpg
      - ./ssl/cert.crt:/etc/ssl/cert.crt
      - ./ssl/private.key:/etc/ssl/private.key
    networks:
      - xraynet

networks:
  xraynet:
