services:
  xray:
    image: teddysun/xray:25.6.8
    container_name: "xray"
    restart: unless-stopped
    volumes:
      - ./xray/config.json:/etc/xray/config.json
    networks:
      - xraynet

  nginx:
    image: nginx:1.29
    container_name: "nginx"
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/index.html:/var/www/html/index.html
      - ./nginx/cars.jpg:/var/www/html/cars.jpg
      - ./certs/cert.crt:/etc/ssl/cert.crt
      - ./certs/private.key:/etc/ssl/private.key
    networks:
      - xraynet

networks:
  xraynet:
